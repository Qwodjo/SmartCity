x-spark-common: &spark-common
  image: public.ecr.aws/bitnami/spark:latest
  volumes:
    - ./jobs:/opt/bitnami/spark/jobs  #folder with spark jobs
  command: bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077   #command to differrentiate master and worker
  depends_on:
    - spark-master
  environment:
     SPARK_MODE: "worker"
     SPARK_WORKER_CORES: 2
     SPARK_WORKER_MEMORY: 1g
     SPARK_MASTER: "spark://spark-master:7077"
  networks:
    - datamasterylab


services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: 
      - datamasterylab

  broker:
    image: confluentinc/cp-kafka:7.4.0
    hostname: broker
    container_name: broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CONFLUENT_LICENSE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONFLUENT_BALANCER_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      CONFLUENT_METRICS_ENABLED: "false"
      CONFLUENT_SUPPORT_CUSTOMER_ID: "anonymous"
    networks:
      - datamasterylab
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  spark-master:
    image: public.ecr.aws/bitnami/spark:latest
    volumes:
      - ./jobs:/opt/bitnami/spark/jobs  #folder with spark jobs
    command: bin/spark-class org.apache.spark.deploy.master.Master   #command to differrentiate master and worker
    ports:
      - "9090:8080"  # 9090 for master and 8080 for container
      - "7077:7077"  # where spark would ne sitting for worker to connect
    networks:
        - datamasterylab


  spark-worker-1:
    <<: *spark-common
  spark-worker-2:
    <<: *spark-common
  #spark-worker-3:
  # <<: *spark-commo
  #spark-worker-4:
  # <<: *spark-common
    

networks:
  datamasterylab:
    driver: bridge